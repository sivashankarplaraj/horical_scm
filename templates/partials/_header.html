{% load static %}
<nav class="navbar navbar-dark" style="background-color: #2c3e50;">
    <div class="container-fluid">
        <div class="d-flex align-items-center">
            <button class="btn btn-outline-light btn-sm me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sideMenu">
                <i class="bi bi-list"></i> Menu
            </button>
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-shield-fill text-warning me-1" style="font-size:1.4rem;"></i>
                <span class="fw-bold" style="font-size:1.2rem;">HORICAL</span>
                <span class="ms-1 fw-bold text-warning" style="font-size:0.85rem;">SCS</span>
            </a>
        </div>
        {% if current_branch %}
        <div class="d-flex align-items-center">
            <form method="post" action="{% url 'accounts:switch_branch' %}" class="d-flex">
                {% csrf_token %}
                <select name="branch_id" class="form-select form-select-sm me-1" style="width:auto;">
                    {% for b in user_branches %}
                    <option value="{{ b.id }}" {% if b.id == current_branch.id %}selected{% endif %}>
                        {{ b.display_name }}
                    </option>
                    {% endfor %}
                </select>
                <button type="submit" class="btn btn-sm btn-light">Go</button>
            </form>
        </div>
        {% endif %}
    </div>
</nav>

<!-- Side Menu Offcanvas -->
<div class="offcanvas offcanvas-start" tabindex="-1" id="sideMenu">
    <div class="offcanvas-header" style="background-color: #2c3e50;">
        <h5 class="offcanvas-title text-white">Menu</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
        <div class="list-group list-group-flush">
            <a href="/" class="list-group-item list-group-item-action"><i class="bi bi-house me-2"></i>Dashboard</a>
            <a href="{% url 'jobs:quick_load_posting' %}" class="list-group-item list-group-item-action"><i class="bi bi-plus-circle me-2"></i>Quick Load Posting</a>
            <a href="{% url 'jobs:load_list' %}" class="list-group-item list-group-item-action"><i class="bi bi-list-ul me-2"></i>Load List</a>
            <a href="{% url 'operations:trailer_attendance' %}" class="list-group-item list-group-item-action"><i class="bi bi-clipboard-check me-2"></i>Trailer Attendance</a>
            <a href="{% url 'operations:planning_job_list' %}" class="list-group-item list-group-item-action"><i class="bi bi-calendar-check me-2"></i>Trailer Planning</a>
            <a href="{% url 'operations:placement_job_list' %}" class="list-group-item list-group-item-action"><i class="bi bi-truck me-2"></i>Trailer Placement</a>
            <a href="{% url 'tracking:vehicle_status_list' %}" class="list-group-item list-group-item-action"><i class="bi bi-geo-alt me-2"></i>Vehicle Status Update</a>
            <a href="{% url 'tracking:pod_list' %}" class="list-group-item list-group-item-action"><i class="bi bi-file-earmark-check me-2"></i>POD Update</a>
            <a href="{% url 'jobs:unconnected_list' %}" class="list-group-item list-group-item-action"><i class="bi bi-x-circle me-2"></i>Unconnected Job List</a>
            <hr class="my-0">
            <a href="/admin/" class="list-group-item list-group-item-action"><i class="bi bi-gear me-2"></i>Admin</a>
            <a href="{% url 'accounts:logout' %}" class="list-group-item list-group-item-action text-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
        </div>
    </div>
</div>
