<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login &mdash; Horical SCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p7TVDtwKNARJ5WqE2GBo5fafJ+oz8"
          crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #1a3a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .brand-header {
            background: #1b3a4b;
            color: #ffffff;
            text-align: center;
            padding: 2rem 1.5rem 1.5rem;
            border-radius: 12px 12px 0 0;
        }
        .brand-header h3 {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .brand-header small {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="brand-header">
            <h3>HORICAL SCS</h3>
            <small>Horical &mdash; Supply Chain Management</small>
        </div>
        <div class="card-body p-4">
            {% if form.errors %}
            <div class="alert alert-danger py-2" role="alert">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">Password</label>
                    {{ form.password }}
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                </div>
            </form>
        </div>
        <div class="card-footer text-center text-muted small py-3">
            &copy; Horical
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
</body>
</html>
